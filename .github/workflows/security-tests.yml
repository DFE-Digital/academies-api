name: Security scanner tests

on:
  workflow_run:
    workflows: ["Deploy to environment"]
    types:
      - completed
  workflow_dispatch:

env:
  ZAP_ADDRESS: localhost
  ZAP_PORT: 9876
  ZAP_IMAGE: zaproxy/zap-stable
  ZAP_VERSION: latest

jobs:
  run-tests-with-zap:
    name: Run Playwright tests with OWASP ZAP
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_repository.full_name == github.repository)
    environment: development
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: Tests/Dfe.Academies.PlaywrightTests
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Create directory on runner
        run: mkdir -m 777 ${{ github.workspace }}/zapoutput

      - name: Restore ZAP container from cache if exists
        id: cache-docker-zap
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: ~/ci/cache/docker/zaproxy
          key: cache-docker-zap-${{ env.ZAP_IMAGE }}-${{ env.ZAP_VERSION }}

      - name: Use cached image if hit
        if: steps.cache-docker-zap.outputs.cache-hit == 'true'
        run: docker image load --input ~/ci/cache/docker/zaproxy/zap-stable-${{ env.ZAP_VERSION }}.tar

      - name: Pull image if no cache hit
        if: steps.cache-docker-zap.outputs.cache-hit != 'true'
        run: |
          docker pull ${{ env.ZAP_IMAGE }}:${{ env.ZAP_VERSION }}
          mkdir -p ~/ci/cache/docker/zaproxy
          docker image save ${{ env.ZAP_IMAGE }}:${{ env.ZAP_VERSION }} \
            --output ~/ci/cache/docker/zaproxy/zap-stable-${{ env.ZAP_VERSION }}.tar

      - name: Start ZAP container
        env:
          ZAP_API_KEY: ${{ secrets.ZAP_API_KEY }}
        run: |
          docker run --name zap_container --rm -d \
            -v ${{ github.workspace }}/zapoutput/:/zap/wrk:rw \
            -u zap \
            -e ZAP_PORT=${{ env.ZAP_PORT }} \
            -p ${{ env.ZAP_PORT }}:${{ env.ZAP_PORT }} \
            -i ${{ env.ZAP_IMAGE }}:${{ env.ZAP_VERSION }} \
            zap.sh -daemon -port ${{ env.ZAP_PORT }} -host 0.0.0.0 \
            -config api.key=${ZAP_API_KEY} \
            -config api.addrs.addr.name=.* \
            -config api.addrs.addr.regex=true \
            -config network.localServers.mainProxy.alpn.enabled=false \
            -config network.localServers.mainProxy.address=0.0.0.0

      - name: Wait for ZAP to be ready
        run: |
          for attempt in $(seq 1 30); do
            status=$(docker inspect --format='{{.State.Health.Status}}' zap_container 2>/dev/null || echo "starting")
            if [ "$status" = "healthy" ]; then
              echo "ZAP is ready"
              exit 0
            fi
            echo "Waiting for ZAP... (${attempt}/30, status=${status})"
            sleep 2
          done
          echo "ZAP failed to start"
          docker logs zap_container
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Tests/Dfe.Academies.PlaywrightTests/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests with scanner
        env:
          API_KEY: ${{ secrets.TRAMS_API_KEY }}
          API_BASE_URL: ${{ secrets.TRAMS_API_BASE_URL }}
          ZAP_PROXY: http://${{ env.ZAP_ADDRESS }}:${{ env.ZAP_PORT }}
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
        run: npm test

      - name: Generate ZAP report
        if: always()
        env:
          ZAP_API_KEY: ${{ secrets.ZAP_API_KEY }}
          ZAP_ADDRESS: ${{ env.ZAP_ADDRESS }}
          ZAP_PORT: ${{ env.ZAP_PORT }}
        run: npm run zap:report

      - name: Get git sha
        if: ${{ !cancelled() }}
        run: echo "checked_out_sha=${{ github.event.workflow_run.head_sha || github.sha }}" >> $GITHUB_ENV

      - name: Azure login with OIDC
        if: ${{ !cancelled() }}
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ secrets.AZURE_OWASP_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Push report to blob storage
        if: ${{ !cancelled() }}
        uses: azure/CLI@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3
        with:
          azcliversion: 2.87.0
          inlineScript: |
            az storage blob upload \
              --container-name ${{ secrets.OWASP_STORAGE_CONTAINER_NAME }} \
              --account-name ${{ secrets.OWASP_STORAGE_ACCOUNT_NAME }} \
              --file "${{ github.workspace }}/zapoutput/ZAP-Report.html" \
              --name "TramsDataApi/${{ env.checked_out_sha }}/ZAP-Report.html" \
              --auth-mode login \
              --overwrite

      - name: Report results to Teams
        if: ${{ !cancelled() }}
        run: npm run zap:report:teams
        env:
          TEAMS_OWASP_SCAN_WEBHOOK_URL: ${{ secrets.TEAMS_OWASP_SCAN_WEBHOOK_URL }}
          ZAP_API_KEY: ${{ secrets.ZAP_API_KEY }}
          ZAP_ADDRESS: ${{ env.ZAP_ADDRESS }}
          ZAP_PORT: ${{ env.ZAP_PORT }}
          REPORT_LINK: https://${{ secrets.OWASP_STORAGE_ACCOUNT_NAME }}.blob.core.windows.net/${{ secrets.OWASP_STORAGE_CONTAINER_NAME }}/TramsDataApi/${{ env.checked_out_sha }}/ZAP-Report.html
          INFORMATION_LINK: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Stop ZAP container
        if: always()
        run: docker stop zap_container || true
